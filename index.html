<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plus Two Biology</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7E7E62">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        @font-face { font-family: 'PlusTwoFont'; src: url('Plustwo.ttf'); }
        @font-face { font-family: 'SubjectFont'; src: url('Subject.ttf'); }
        @font-face { font-family: 'CaptionFont'; src: url('Caption.ttf'); }
        @font-face { font-family: 'ButtonFont'; src: url('Font.ttf'); }

        /* --- INTERACTIVE ANIMATIONS --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            background-color: #ffffff;
            color: #2c2c2c;
            margin: 0 auto;
            padding: 40px 25px;
            max-width: 480px;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .plus-two {
            font-family: 'PlusTwoFont', sans-serif;
            color: #7E7E62;
            font-size: 1.4rem;
            margin-bottom: 25px;
            display: inline-block;
            text-decoration: none;
            animation: fadeInUp 0.6s ease forwards;
        }

        h1 {
            font-family: 'SubjectFont', sans-serif;
            font-size: 3.5rem;
            margin: 0;
            color: #222;
            animation: fadeInUp 0.6s ease 0.1s forwards;
            opacity: 0;
        }

        .tagline {
            font-family: 'CaptionFont', sans-serif;
            font-size: 1.1rem;
            margin: 10px 0 0 0;
            color: #555;
            animation: fadeInUp 0.6s ease 0.2s forwards;
            opacity: 0;
        }

        .wp-divider {
            border: 0;
            height: 2px;
            background-color: #92593B; 
            width: 60px;
            margin: 30px auto;
            animation: fadeInUp 0.6s ease 0.3s forwards;
            opacity: 0;
        }

        /* --- SOCIAL ICONS INTERACTION --- */
        .social-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            animation: fadeInUp 0.6s ease 0.4s forwards;
            opacity: 0;
        }

        .social-icon {
            background-color: #7E7E62;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .social-icon:active {
            transform: scale(1.2);
            background-color: #92593B;
        }

        /* --- HUB BUTTONS (PROFESSIONAL INTERACTIVE) --- */
        .hub-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-top: 10px;
        }

        .hub-btn {
            background-color: #7E7E62;
            color: #ffffff;
            text-decoration: none;
            padding: 24px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 6px 15px rgba(126, 126, 98, 0.2);
            -webkit-tap-highlight-color: transparent;
            animation: fadeInUp 0.6s ease 0.5s forwards;
            opacity: 0;
        }

        /* Hover/Focus effect for desktop/tablet */
        @media (hover: hover) {
            .hub-btn:hover {
                transform: translateY(-3px);
                box-shadow: 0 10px 20px rgba(126, 126, 98, 0.3);
                background-color: #8c8c6e;
            }
        }

        /* Pressed state (The "Professional" feel) */
        .hub-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            filter: brightness(0.9);
        }

        .hub-btn i {
            font-size: 1.6rem;
            transition: transform 0.3s ease;
        }

        .hub-btn:active i {
            transform: rotate(10deg) scale(1.1);
        }

        .hub-text {
            font-family: 'ButtonFont', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 0.5px;
        }

        /* Secondary Button Stagger */
        .hub-btn:nth-child(2) {
            animation-delay: 0.6s;
        }

    </style>
</head>
<body>

    <a href="http://www.instagram.com/unfav.mibssm" class="plus-two">PLUS TWO</a>
    
    <h1>Biology</h1>
    <p class="tagline">Where multiplication and division mean the same thing. 🧬✖️</p>

    <hr class="wp-divider">

    <div class="social-container">
        <a href="http://www.instagram.com/unfav.mibssm" class="social-icon"><i class="fab fa-instagram"></i></a>
        <a href="https://youtube.com/@unfav.mibssm" class="social-icon"><i class="fab fa-youtube"></i></a>
        <a href="https://t.me/Mibu_Techy" class="social-icon"><i class="fab fa-telegram"></i></a>
        <a href="https://www.snapchat.com/add/unfav.mibssm" class="social-icon"><i class="fab fa-snapchat"></i></a>
        <a href="https://github.com/unfav-mibssm" class="social-icon"><i class="fab fa-github"></i></a>
    </div>

    <hr class="wp-divider">

    <div class="hub-container">
        <a href="https://unfav-mibssm.github.io/Biology-Botany-2/" class="hub-btn">
            <i class="fas fa-leaf"></i>
            <span class="hub-text">Botany</span>
        </a>

        <a href="https://unfav-mibssm.github.io/Biology-Zoology-2/" class="hub-btn">
            <i class="fas fa-paw"></i>
            <span class="hub-text">Zoology</span>
        </a>
    </div>

    <script>
        if ('service-worker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js');
        }
    </script>
</body>
</html>
