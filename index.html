<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plus Two Biology</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7E7E62">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        /* --- FONT REGISTRATION --- */
        @font-face { font-family: 'PlusTwoFont'; src: url('Plustwo.ttf'); }
        @font-face { font-family: 'SubjectFont'; src: url('Subject.ttf'); }
        @font-face { font-family: 'CaptionFont'; src: url('Caption.ttf'); }
        @font-face { font-family: 'ButtonFont'; src: url('Font.ttf'); }

        /* --- UI POP ANIMATION --- */
        .reveal {
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* --- GLOBAL STYLES --- */
        body {
            background-color: #ffffff;
            color: #2c2c2c;
            margin: 0 auto;
            padding: 40px 25px;
            max-width: 480px;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* --- GLOBAL LINK RESET (KILLS BLUE BOX) --- */
        a {
            outline: none;
            -webkit-tap-highlight-color: transparent;
            text-decoration: none;
        }

        /* --- THE RESTORED "CLICKED" VIBE --- */
        .plus-two-link {
            display: inline-block;
            transition: transform 0.1s ease; /* Fast response for tapping */
        }

        .plus-two-link:active {
            transform: scale(0.95); /* This is the "being clicked" thing! */
        }

        .plus-two {
            font-family: 'PlusTwoFont', sans-serif;
            color: #7E7E62;
            font-size: 1.4rem;
            margin-bottom: 25px;
            display: inline-block;
        }

        h1 {
            font-family: 'SubjectFont', sans-serif;
            font-size: 3.5rem;
            margin: 0;
            color: #222;
        }

        .tagline {
            font-family: 'CaptionFont', sans-serif;
            font-size: 1.1rem;
            margin: 10px 0 0 0;
            color: #555;
        }

        .wp-divider {
            border: 0;
            height: 2px;
            background-color: #92593B; 
            width: 60px;
            margin: 20px auto;
        }

        /* --- SOCIAL ICONS --- */
        .social-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 10px 0;
        }

        .social-icon {
            background-color: #7E7E62;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .social-icon:active {
            transform: scale(1.2);
            background-color: #92593B;
        }

        /* --- HUB BUTTONS --- */
        .hub-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-top: 10px;
        }

        .hub-btn {
            background-color: #7E7E62;
            color: #ffffff;
            padding: 24px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 15px rgba(126, 126, 98, 0.2);
        }

        .hub-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            filter: brightness(0.9);
        }

        .hub-btn i {
            font-size: 1.6rem;
            transition: transform 0.3s ease;
        }

        .hub-btn:active i {
            transform: rotate(10deg) scale(1.1);
        }

        .hub-text {
            font-family: 'ButtonFont', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 0.5px;
        }

    </style>
</head>
<body>

    <div class="reveal active">
        <a href="http://www.instagram.com/unfav.mibssm" class="plus-two-link">
            <div class="plus-two">PLUS TWO</div>
        </a>
        <h1>Biology</h1>
        <p class="tagline">Where multiplication and division mean the same thing. 🧬✖️</p>
    </div>

    <hr class="wp-divider reveal">

    <div class="social-container reveal">
        <a href="http://www.instagram.com/unfav.mibssm" class="social-icon"><i class="fab fa-instagram"></i></a>
        <a href="https://youtube.com/@unfav.mibssm" class="social-icon"><i class="fab fa-youtube"></i></a>
        <a href="https://telegram.me/Mibu_Techy" class="social-icon"><i class="fab fa-telegram"></i></a>
        <a href="https://www.snapchat.com/add/unfav.mibssm" class="social-icon"><i class="fab fa-snapchat"></i></a>
        <a href="https://github.com/unfav-mibssm" class="social-icon"><i class="fab fa-github"></i></a>
    </div>

    <hr class="wp-divider reveal">

    <div class="hub-container">
        <a href="https://unfav-mibssm.github.io/Biology-Botany-2/" class="hub-btn reveal">
            <i class="fas fa-leaf"></i>
            <span class="hub-text">Botany</span>
        </a>

        <a href="https://unfav-mibssm.github.io/Biology-Zoology-2/" class="hub-btn reveal">
            <i class="fas fa-paw"></i>
            <span class="hub-text">Zoology</span>
        </a>
    </div>

    <script>
        const observerOptions = { threshold: 0.15 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        if ('service-worker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js');
            });
        }
    </script>
</body>
</html>
